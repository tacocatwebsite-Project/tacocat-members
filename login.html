<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>TacoCat Members - Login</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="members.css">
</head>

<body>

    <h1>🌮 TacoCat Members</h1>

    <h2>Welcome Back</h2>

    <form id="loginForm">

        <input
            type="email"
            id="loginEmail"
            placeholder="Email"
            autocomplete="email"
            required
        >

        <br><br>

        <input
            type="password"
            id="loginPassword"
            placeholder="Password"
            autocomplete="current-password"
            required
        >

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

    <p id="loginMessage"></p>

    <p>
        Don’t have an account?
        <a href="register.html">Create Account</a>
    </p>

    <script src="supabase.js"></script>
<script src="auth.js"></script>

</body>
</html>
