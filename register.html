<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TacoCat Members - Register</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="members.css">
</head>

<body>

    <h1>🌮 TacoCat Members</h1>

    <h2>Create Your Account</h2>

    <form id="registerForm">

        <input
            type="text"
            id="username"
            placeholder="Username"
            required
        >

        <br><br>

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <br><br>

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <br><br>

        <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password"
            required
        >

        <br><br>

        <button type="submit">
            Create Account
        </button>

    </form>

    <p>
        Already have an account?
        <a href="login.html">Login</a>
    </p>

    <script src="auth.js"></script>

</body>
</html>
